---
name: Dispatch Helm Release

on:
  workflow_call:
    inputs:
      version:
        description: Release tag to dispatch (X.Y.Z or vX.Y.Z)
        required: true
        type: string
      permesi_digest:
        description: Published GHCR digest for ghcr.io/permesi/permesi.
        required: false
        default: ''
        type: string
      genesis_digest:
        description: Published GHCR digest for ghcr.io/permesi/genesis.
        required: false
        default: ''
        type: string
      web_digest:
        description: Published GHCR digest for ghcr.io/permesi/web.
        required: false
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to dispatch (X.Y.Z or vX.Y.Z)
        required: true
        type: string
      permesi_digest:
        description: Published GHCR digest for ghcr.io/permesi/permesi.
        required: false
        default: ''
        type: string
      genesis_digest:
        description: Published GHCR digest for ghcr.io/permesi/genesis.
        required: false
        default: ''
        type: string
      web_digest:
        description: Published GHCR digest for ghcr.io/permesi/web.
        required: false
        default: ''
        type: string

concurrency:
  group: dispatch-helm-release-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    name: Notify permesi-helm
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          raw="${{ inputs.version }}"
          source_tag="${{ inputs.version }}"
          permesi_digest="${{ inputs.permesi_digest }}"
          genesis_digest="${{ inputs.genesis_digest }}"
          web_digest="${{ inputs.web_digest }}"

          version="${raw#v}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported release tag '${raw}'. Expected X.Y.Z or vX.Y.Z." >&2
            exit 1
          fi

          for digest in "${permesi_digest}" "${genesis_digest}" "${web_digest}"; do
            if [[ -n "${digest}" && ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Invalid digest '${digest}'." >&2
              exit 1
            fi
          done

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "source_tag=${source_tag}" >> "$GITHUB_OUTPUT"
          echo "permesi_digest=${permesi_digest}" >> "$GITHUB_OUTPUT"
          echo "genesis_digest=${genesis_digest}" >> "$GITHUB_OUTPUT"
          echo "web_digest=${web_digest}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.PERMESI_HELM_APP_ID }}
          private-key: ${{ secrets.PERMESI_HELM_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: permesi-helm

      - name: Dispatch release to permesi-helm
        shell: bash
        run: |
          set -euo pipefail

          cat > payload.json <<JSON
          {
            "event_type": "permesi-release",
            "client_payload": {
              "version": "${{ steps.meta.outputs.version }}",
              "source_repo": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}",
              "source_tag": "${{ steps.meta.outputs.source_tag }}",
              "images": {
                "permesi": {
                  "repository": "ghcr.io/permesi/permesi",
                  "tag": "${{ steps.meta.outputs.version }}",
                  "digest": "${{ steps.meta.outputs.permesi_digest }}"
                },
                "genesis": {
                  "repository": "ghcr.io/permesi/genesis",
                  "tag": "${{ steps.meta.outputs.version }}",
                  "digest": "${{ steps.meta.outputs.genesis_digest }}"
                },
                "web": {
                  "repository": "ghcr.io/permesi/web",
                  "tag": "${{ steps.meta.outputs.version }}",
                  "digest": "${{ steps.meta.outputs.web_digest }}"
                }
              }
            }
          }
          JSON

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/permesi/permesi-helm/dispatches \
            --data @payload.json
